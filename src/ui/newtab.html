<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #f0eeeb;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .greeting {
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 32px;
      color: #6e6e73;
    }
    .greeting em {
      color: #e94560;
      font-style: normal;
      font-weight: 500;
    }
    .search-box {
      width: 560px;
      max-width: 90vw;
      position: relative;
    }
    .search-box input {
      width: 100%;
      height: 48px;
      background: #f7f6f3;
      border: 1px solid #e5e5ea;
      border-radius: 24px;
      padding: 0 48px 0 20px;
      color: #1d1d1f;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input::placeholder { color: #aeaeb2; }
    .search-box input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.12);
    }
    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #aeaeb2;
      pointer-events: none;
    }
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fit, 88px);
      gap: 16px;
      margin-top: 48px;
      justify-content: center;
      max-width: 560px;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .shortcut:hover { background: rgba(0,0,0,0.04); }
    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #e4e2df;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .shortcut-label {
      font-size: 11px;
      color: #6e6e73;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }
    .lotus {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 24px;
      opacity: 0.3;
      transition: opacity 0.3s;
      color: #d4628a;
    }
    .lotus:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="greeting">Ask <em>Aria</em> anything</div>
  <div class="search-box">
    <input id="search" type="text" placeholder="Search the web or enter a URL" autofocus>
    <span class="search-icon">⌕</span>
  </div>
  <div class="shortcuts" id="shortcuts"></div>
  <div class="lotus" title="Aria"><svg class="aria-icon" width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2C12.3 7.5 16.5 11.7 22 12 16.5 12.3 12.3 16.5 12 22 11.7 16.5 7.5 12.3 2 12 7.5 11.7 11.7 7.5 12 2Z" fill="currentColor" opacity="0.85"/></svg></div>

  <script>
    const defaultShortcuts = [
      { label: 'Google', url: 'https://www.google.com', icon: '🔍' },
      { label: 'YouTube', url: 'https://www.youtube.com', icon: '▶️' },
      { label: 'GitHub', url: 'https://github.com', icon: '🐙' },
      { label: 'Reddit', url: 'https://www.reddit.com', icon: '🤖' },
      { label: 'Twitter', url: 'https://x.com', icon: '𝕏' },
      { label: 'Gmail', url: 'https://mail.google.com', icon: '✉️' },
    ];

    const container = document.getElementById('shortcuts');
    defaultShortcuts.forEach(s => {
      const a = document.createElement('a');
      a.className = 'shortcut';
      a.href = s.url;
      a.innerHTML = `<div class="shortcut-icon">${s.icon}</div><div class="shortcut-label">${s.label}</div>`;
      container.appendChild(a);
    });

    // Search input — Enter navigates
    document.getElementById('search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (!val) return;
        if (/^https?:\/\//i.test(val) || /^[^\s]+\.[^\s]+$/.test(val)) {
          window.location.href = val.startsWith('http') ? val : 'https://' + val;
        } else {
          window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }
    });
  </script>
</body>
</html>
