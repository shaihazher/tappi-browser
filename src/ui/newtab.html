<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .greeting {
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 32px;
      color: #8892a4;
    }
    .greeting em {
      color: #e94560;
      font-style: normal;
      font-weight: 500;
    }
    .search-box {
      width: 560px;
      max-width: 90vw;
      position: relative;
    }
    .search-box input {
      width: 100%;
      height: 48px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 24px;
      padding: 0 48px 0 20px;
      color: #e0e0e0;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input::placeholder { color: #5a6478; }
    .search-box input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
    }
    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #5a6478;
      pointer-events: none;
    }
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fit, 88px);
      gap: 16px;
      margin-top: 48px;
      justify-content: center;
      max-width: 560px;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .shortcut:hover { background: rgba(255,255,255,0.05); }
    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .shortcut-label {
      font-size: 11px;
      color: #8892a4;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }
    .lotus {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 24px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .lotus:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="greeting">Ask <em>Aria</em> anything</div>
  <div class="search-box">
    <input id="search" type="text" placeholder="Search the web or enter a URL" autofocus>
    <span class="search-icon">⌕</span>
  </div>
  <div class="shortcuts" id="shortcuts"></div>
  <div class="lotus" title="Aria"><svg class="aria-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C12 2 8.5 7 8.5 10.5C8.5 12.4 9.3 13.8 10.5 14.6C9 15.2 7 15 5 14C5 14 5.5 17 8 19C9.2 20 10.5 20.5 12 20.5C13.5 20.5 14.8 20 16 19C18.5 17 19 14 19 14C17 15 15 15.2 13.5 14.6C14.7 13.8 15.5 12.4 15.5 10.5C15.5 7 12 2 12 2Z" fill="url(#lotus-grad-nt)" stroke="rgba(197,123,168,0.6)" stroke-width="0.5" stroke-linejoin="round"/><ellipse cx="12" cy="21.5" rx="4" ry="1" fill="rgba(197,123,168,0.15)"/><defs><linearGradient id="lotus-grad-nt" x1="12" y1="2" x2="12" y2="20.5" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#f0b4d4"/><stop offset="100%" stop-color="#c57ba8"/></linearGradient></defs></svg></div>

  <script>
    const defaultShortcuts = [
      { label: 'Google', url: 'https://www.google.com', icon: '🔍' },
      { label: 'YouTube', url: 'https://www.youtube.com', icon: '▶️' },
      { label: 'GitHub', url: 'https://github.com', icon: '🐙' },
      { label: 'Reddit', url: 'https://www.reddit.com', icon: '🤖' },
      { label: 'Twitter', url: 'https://x.com', icon: '𝕏' },
      { label: 'Gmail', url: 'https://mail.google.com', icon: '✉️' },
    ];

    const container = document.getElementById('shortcuts');
    defaultShortcuts.forEach(s => {
      const a = document.createElement('a');
      a.className = 'shortcut';
      a.href = s.url;
      a.innerHTML = `<div class="shortcut-icon">${s.icon}</div><div class="shortcut-label">${s.label}</div>`;
      container.appendChild(a);
    });

    // Search input — Enter navigates
    document.getElementById('search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (!val) return;
        if (/^https?:\/\//i.test(val) || /^[^\s]+\.[^\s]+$/.test(val)) {
          window.location.href = val.startsWith('http') ? val : 'https://' + val;
        } else {
          window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }
    });
  </script>
</body>
</html>
