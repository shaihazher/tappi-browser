<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src * data:; connect-src 'none';">
  <link rel="stylesheet" href="aria.css">
  <title>Aria — AI Assistant</title>
</head>
<body>
  <!-- Left sidebar: conversation history -->
  <div id="aria-sidebar">
    <div id="sidebar-header">
      <span class="sidebar-logo"><svg class="aria-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2C12.3 7.5 16.5 11.7 22 12 16.5 12.3 12.3 16.5 12 22 11.7 16.5 7.5 12.3 2 12 7.5 11.7 11.7 7.5 12 2Z" fill="currentColor" opacity="0.85"/></svg> Aria</span>
      <button id="new-chat-btn" title="New Chat">＋</button>
    </div>

    <!-- Phase 9.09: Active project indicator (hidden when no project) -->
    <div id="aria-project-indicator" class="hidden">
      <span id="aria-project-indicator-text">🏗 project</span>
    </div>

    <div id="sidebar-search-wrap">
      <input id="sidebar-search" type="text" placeholder="Search conversations…" spellcheck="false" autocomplete="off">
    </div>

    <div id="conversation-list">
      <!-- Populated by aria.js -->
    </div>
  </div>

  <!-- Main chat area -->
  <div id="aria-main">
    <!-- Coding mode banner — visible only when body.coding-mode is set -->
    <div class="coding-mode-banner">
      <span class="banner-icon">⟩_</span>
      <span>CODING MODE</span>
      <span style="color: #0d660d; margin-left: auto;">team orchestration active</span>
    </div>

    <!-- Team status card (Fix 4): shown when a coding team is active -->
    <div id="aria-team-card" class="hidden">
      <div id="aria-team-header">
        <span id="aria-team-title">👥 Team Active</span>
        <button id="aria-team-collapse" title="Collapse">▲</button>
      </div>
      <div id="aria-team-body">
        <div id="aria-team-task"></div>
        <div id="aria-team-members"></div>
        <div id="aria-team-progress"></div>
      </div>
    </div>

    <div id="aria-messages">
      <!-- Populated by aria.js -->
      <div class="aria-welcome">
        <div class="welcome-icon"><svg class="aria-icon-lg" width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M12 2C12.3 7.5 16.5 11.7 22 12 16.5 12.3 12.3 16.5 12 22 11.7 16.5 7.5 12.3 2 12 7.5 11.7 11.7 7.5 12 2Z" fill="currentColor" opacity="0.85"/></svg></div>
        <div class="welcome-title">Hello, I'm Aria</div>
        <div class="welcome-subtitle">Your AI assistant built into the browser.<br>Ask me anything — I can browse the web, run code, and more.</div>
        <div class="welcome-suggestions">
          <button class="suggestion-chip" data-prompt="What's the weather like today?">🌤 Weather today</button>
          <button class="suggestion-chip" data-prompt="Search for the latest news on AI">📰 AI news</button>
          <button class="suggestion-chip" data-prompt="Help me write a quick email">✉️ Write email</button>
          <button class="suggestion-chip" data-prompt="Find me a good recipe for dinner">🍳 Dinner recipe</button>
        </div>
      </div>
    </div>

    <!-- Token progress bar -->
    <div id="aria-token-bar">
      <div id="aria-token-fill"></div>
      <span id="aria-token-label">0 / 200K ctx</span>
    </div>

    <!-- Input area -->
    <div id="aria-input-area">
      <textarea id="aria-input" placeholder="Ask Aria anything…" rows="1" spellcheck="true" autocomplete="off"></textarea>
      <div id="aria-controls">
        <!-- Model Picker (Phase 9.13) -->
        <div id="aria-model-picker-wrap">
          <button id="aria-model-btn" class="model-picker-btn" title="Select model">
            <span class="model-provider-icon" data-provider="anthropic">🤖</span>
            <span class="model-name">claude-sonnet-4-6</span>
            <span class="dropdown-arrow">▼</span>
          </button>
          <button id="aria-thinking-btn" class="thinking-toggle on" title="Thinking: ON">
            <span class="thinking-icon">🧠</span>
          </button>
        </div>
        <!-- Enhance prompt controls (Phase 9.098) -->
        <div id="aria-enhance-wrap">
          <button id="aria-enhance-btn" title="Enhance prompt with AI">✨</button>
          <div id="aria-enhance-dropdown" class="hidden">
            <button data-mode="quick" class="enhance-option selected">
              <span class="enhance-icon">⚡</span>
              <span class="enhance-label">Quick</span>
              <span class="enhance-desc">Structure & clarity</span>
            </button>
            <button data-mode="deep" class="enhance-option">
              <span class="enhance-icon">🔮</span>
              <span class="enhance-label">Deep</span>
              <span class="enhance-desc">Adversarial analysis</span>
            </button>
          </div>
        </div>
        <button id="aria-stop-btn" class="hidden" title="Stop (Esc)">⏹</button>
        <button id="aria-send-btn" title="Send (⏎)">↑</button>
      </div>
      <div id="aria-enhance-status" class="hidden"></div>

      <!-- Model Dropdown (Phase 9.13) — positioned relative to aria-controls -->
      <div id="aria-model-dropdown" class="model-dropdown hidden">
        <div class="model-dropdown-header">
          <select id="aria-provider-select">
            <option value="anthropic">Anthropic</option>
            <option value="openai-codex">OpenAI Codex</option>
            <option value="openai">OpenAI</option>
            <option value="google">Google</option>
            <option value="openrouter">OpenRouter</option>
            <option value="ollama">Ollama (Local)</option>
            <option value="bedrock">AWS Bedrock</option>
            <option value="vertex">Vertex AI</option>
            <option value="azure">Azure OpenAI</option>
            <option value="claude-code">Claude Code</option>
          </select>
          <input id="aria-model-search" type="text" placeholder="Search models...">
        </div>
        <div id="aria-model-list" class="model-list">
          <!-- Populated dynamically -->
        </div>
        <!-- Claude Code Settings (visible when provider=claude-code) -->
        <div id="aria-cc-mode-wrap" class="cc-mode-wrap hidden">
          <div class="cc-mode-header">Authentication</div>
          <select id="aria-cc-auth-select">
            <option value="oauth" selected>Claude Login (OAuth) — uses claude CLI</option>
            <option value="api-key">API Key — uses ANTHROPIC_API_KEY</option>
            <option value="bedrock">AWS Bedrock — uses AWS credential chain</option>
          </select>
          <!-- Bedrock settings (visible when auth=bedrock) -->
          <div id="aria-cc-bedrock-wrap" class="cc-bedrock-settings hidden">
            <label class="cc-bedrock-label">AWS Region</label>
            <input id="aria-cc-bedrock-region" type="text" placeholder="us-east-1" class="cc-input-small">
            <label class="cc-bedrock-label">AWS Profile <span class="optional-label">(optional)</span></label>
            <input id="aria-cc-bedrock-profile" type="text" placeholder="default" class="cc-input-small">
            <div id="aria-cc-bedrock-status" class="cc-bedrock-status"></div>
          </div>
          <div class="cc-mode-header" style="margin-top:8px">Permission Mode</div>
          <select id="aria-cc-mode-select">
            <option value="plan">Plan (review before executing)</option>
            <option value="full" selected>Full Permission (default)</option>
          </select>
          <div class="cc-agent-teams-wrap" style="margin-top:8px">
            <label class="cc-agent-teams-label">
              <input type="checkbox" id="aria-cc-agent-teams">
              Enable Agent Teams <span class="optional-label">(experimental)</span>
            </label>
          </div>
          <button id="aria-cc-install-btn" class="small-btn hidden">Install Now</button>
          <button id="aria-cc-login-btn" class="small-btn hidden">Sign In</button>
          <div id="aria-cc-status" class="cc-status hidden"></div>
        </div>
        <div class="model-dropdown-footer">
          <button id="aria-model-custom-btn" class="small-btn">+ Custom Model</button>
        </div>
      </div>

      <!-- Custom Model Input (Phase 9.13) -->
      <div id="aria-custom-model-modal" class="custom-model-modal hidden">
        <input id="aria-custom-model-input" type="text" placeholder="Enter model ID...">
        <button id="aria-custom-model-save" class="small-btn">Use</button>
      </div>
    </div>
  </div>

  <script src="vendor/dompurify.min.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="aria.js"></script>
</body>
</html>
